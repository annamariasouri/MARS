# Build web/data.js from CSVs and publish the dashboard to GitHub Pages.
name: Deploy MARS Dashboard

on:
  push:
    branches: [main, master]
    paths:
      - "web/**"
      - "data/**"
      - ".github/scripts/export_dashboard_data.py"
      - ".github/workflows/deploy_dashboard.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Export dashboard data
        env:
          MARS_DATA_DIR: data
        run: |
          pip install pandas
          python .github/scripts/export_dashboard_data.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
